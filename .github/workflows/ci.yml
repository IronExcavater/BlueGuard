name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PROJECT: BlueGuard/BlueGuard.csproj
  MANIFEST: BlueGuard/Package.appxmanifest

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        architecture: [x64, ARM64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Build ${{ matrix.architecture }}
        run: >
          dotnet build ${{ env.PROJECT }}
          --configuration Release
          --runtime win-${{ matrix.architecture == 'ARM64' && 'arm64' || 'x64' }}
          -p:Platform=${{ matrix.architecture }}
          -p:PublishReadyToRun=false
          -p:PublishTrimmed=false

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    environment: release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Set version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "Release tags must look like v1.0.2.0"
          }

          [xml] $manifest = Get-Content $env:MANIFEST
          $manifest.Package.Identity.Version = $version
          $manifest.Save((Resolve-Path $env:MANIFEST))

      - name: Prepare signing certificate
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          New-Item artifacts -ItemType Directory | Out-Null

          $pfx = "$env:RUNNER_TEMP\BlueGuard.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:PFX_BASE64))

          $certificate = Get-PfxCertificate `
            -FilePath $pfx `
            -Password (ConvertTo-SecureString $env:PFX_PASSWORD -AsPlainText -Force)

          Export-Certificate -Cert $certificate -FilePath artifacts/BlueGuard.cer | Out-Null
          "PFX_PATH=$pfx" >> $env:GITHUB_ENV

      - name: Package
        shell: pwsh
        env:
          PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")

          foreach ($target in @(
            @{ Architecture = "x64"; Runtime = "x64" },
            @{ Architecture = "ARM64"; Runtime = "arm64" }
          )) {
            dotnet publish $env:PROJECT `
              --configuration Release `
              --runtime "win-$($target.Runtime)" `
              --self-contained true `
              -p:Platform=$($target.Architecture) `
              -p:GenerateAppxPackageOnBuild=true `
              -p:AppxPackageSigningEnabled=true `
              -p:PackageCertificateKeyFile="$env:PFX_PATH" `
              -p:PackageCertificatePassword="$env:PFX_PASSWORD" `
              -p:PublishReadyToRun=false `
              -p:PublishTrimmed=false

            $package = Get-ChildItem BlueGuard -Recurse -Filter *.msix |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1

            Copy-Item $package "artifacts/BlueGuard_${version}_$($target.Runtime).msix"
          }

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          artifacts/*
          --title "${{ github.ref_name }}"
          --generate-notes